# Reverse-proxy для draw-bitch с HTTPS (Let's Encrypt).
#
# Один общий nginx на хосте владеет портами 80/443 и разруливает запросы по
# доменному имени. Приложения слушают свои внутренние порты только на loopback.
# Особенность игры: WebSocket. Поэтому /ws и /api роутятся на бэкенд (:8000),
# остальное — на SSR-фронтенд (:3000).
#
# Первый выпуск и продление сертификата см. в README, раздел «HTTPS».
# Замени drawbitch.duckdns.org на свой домен (и в docker-compose.prod.yml: CORS).

# HTTP: ACME-челлендж + редирект на HTTPS.
server {
    listen 80;
    listen [::]:80;
    server_name drawbitch.duckdns.org;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }
    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS.
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name drawbitch.duckdns.org;

    ssl_certificate     /etc/letsencrypt/live/drawbitch.duckdns.org/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/drawbitch.duckdns.org/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305;
    ssl_prefer_server_ciphers off;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 1d;

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options    "nosniff"                            always;
    add_header X-Frame-Options           "SAMEORIGIN"                         always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin"    always;

    # WebSocket-канал игры → бэкенд. Длинные таймауты, чтобы соединение не рвалось.
    location /ws {
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    # REST API → бэкенд.
    location /api/ {
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Всё остальное → SSR-фронтенд Next.js.
    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}
